<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacta a David López - Ingeniero de Software">
    <title>Contacto | David López</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="logo">David<span>López</span></h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="SobreMi.html">Sobre mí</a></li>
                    <li><a href="Contacto.html">Contacto</a></li>
                    <li><a href="CVDavid.pdf" download class="btn">CV <i class="fas fa-download"></i></a></li>
                </ul>
            </nav>
            <button class="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2 class="section-title animate-fade-in">Mis redes sociales</h2>
                
                <div class="social-grid">
                    <a href="https://instagram.com/mi.davicho?igshid=OGQ5ZDc2ODk2ZA==" class="social-card animate-fade-in">
                        <div class="social-icon">
                            <i class="fab fa-instagram"></i>
                        </div>
                        <h3>Instagram</h3>
                        <p>Sígueme en Instagram</p>
                    </a>

                    <a href="https://www.facebook.com/DavidAndresLopezGalan/" class="social-card animate-fade-in">
                        <div class="social-icon">
                            <i class="fab fa-facebook-f"></i>
                        </div>
                        <h3>Facebook</h3>
                        <p>Conéctate conmigo</p>
                    </a>

                    <a href="http://www.linkedin.com/in/david-andres-lópez-galán-376664287" class="social-card animate-fade-in">
                        <div class="social-icon">
                            <i class="fab fa-linkedin-in"></i>
                        </div>
                        <h3>LinkedIn</h3>
                        <p>Perfil profesional</p>
                    </a>

                    <a href="https://www.youtube.com/channel/UC4abMOkIE4t0Ef5l1E03kCA" class="social-card animate-fade-in">
                        <div class="social-icon">
                            <i class="fab fa-youtube"></i>
                        </div>
                        <h3>YouTube</h3>
                        <p>Mi canal</p>
                    </a>
                </div>

                <div class="contact-form animate-fade-in">
                    <h3>Envíame un mensaje directo</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <input type="text" id="name" name="name" required placeholder="Nombre">
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" name="email" required placeholder="Email">
                        </div>
                        <div class="form-group">
                            <textarea id="message" name="message" required placeholder="Tu mensaje"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Enviar mensaje</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="/Animations.js"></script>
    <script src="/Main.js"></script>
</body>
</html>
